<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KPOPZOO Desktop Pets</title>
    <meta
      name="description"
      content="KPOPZOO 桌宠合集下载页，集中下载 Windows 与 macOS 版本。"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="KPOPZOO 首页">
        <span class="brand-mark">KZ</span>
        <span>
          <strong>KPOPZOO</strong>
          <small>Desktop Pets</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="页面导航">
        <button class="nav-button" type="button" id="privacyButton">素材保护</button>
      </nav>
    </header>

    <main id="top">
      <section class="layout">
        <aside class="group-list" aria-label="团体列表">
          <div id="groupButtons" class="group-buttons"></div>
        </aside>

        <article class="release-detail" aria-live="polite">
          <div class="release-heading">
            <div>
              <p class="eyebrow" id="selectedStatus">Latest release</p>
              <h2 id="selectedTitle"></h2>
            </div>
            <span class="version-pill" id="selectedVersion"></span>
          </div>

          <p class="release-summary" id="selectedSummary"></p>

          <div class="notes-grid" id="guide">
            <section>
              <h3>使用说明</h3>
              <ul id="usageNotes"></ul>
            </section>
            <section>
              <h3>安装提示</h3>
              <ul>
                <li>Windows 推荐下载 Setup 版，双击安装后从开始菜单启动。</li>
                <li>macOS 首次打开如提示安全限制，请在系统设置中允许打开。</li>
                <li>Apple Silicon 选择 arm64，Intel 芯片选择 x64。</li>
              </ul>
            </section>
          </div>

          <section class="downloads" aria-labelledby="download-title">
            <div class="download-title-row">
              <h3 id="download-title">下载</h3>
              <span id="downloadHint"></span>
            </div>
            <div id="downloadCards" class="download-cards"></div>
          </section>
        </article>
      </section>

      <section class="mailbox-section" aria-labelledby="mailbox-title">
        <div class="mailbox-icon" aria-hidden="true">✉</div>
        <div class="mailbox-copy">
          <p class="eyebrow">投稿箱</p>
          <h2 id="mailbox-title">想看哪个团？</h2>
          <p>把你想要的团名留在这里，我会按呼声整理后续桌宠。</p>
        </div>
        <form class="mailbox-form" id="mailboxForm">
          <label for="groupRequest">留言</label>
          <textarea id="groupRequest" name="groupRequest" rows="4" required placeholder="例如：想要某某团 / 某个角色"></textarea>
          <button type="submit">投递</button>
        </form>
      </section>
    </main>

    <dialog class="message-dialog" id="messageDialog" aria-labelledby="dialogTitle">
      <div class="dialog-card">
        <button class="dialog-close" type="button" id="dialogClose" aria-label="关闭弹窗">×</button>
        <p class="dialog-title" id="dialogTitle">已送信</p>
        <p class="dialog-body" id="dialogBody">谢谢你的留言。</p>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
